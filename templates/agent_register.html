<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Enrollment | Insurix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='master.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="centered-page">
    <div class="auth-card animate" style="max-width: 600px;">
        <a href="{{ url_for('index') }}" style="display: flex; align-items: center; gap: 0.5rem; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;">
            <i class="ph ph-arrow-left"></i>Back to Home
        </a>

        <div style="text-align: center; margin-bottom: 3rem;">
            <div style="width: 4rem; height: 4rem; background: rgba(59, 130, 246, 0.1); color: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem;">
                <i class="ph-bold ph-briefcase"></i>
            </div>
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Join Insurix  Network</h1>
            <p style="color: var(--muted); font-size: 0.95rem;">Empower your clients with the Insurix standard</p>
        </div>

        <form action="{{ url_for('agent_register') }}" method="POST">
            <div class="grid-3" style="grid-template-columns: 1fr 0.4fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label class="label"> First</label>
                    <input type="text" name="fname" class="input" placeholder="Field" required>
                </div>
                <div class="form-group">
                    <label class="label"> Middle</label>
                    <input type="text" name="mname" class="input" placeholder="A">
                </div>
                <div class="form-group">
                    <label class="label"> Last</label>
                    <input type="text" name="lname" class="input" placeholder="Agent" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Validated Phone Number</label>
                <input type="tel" name="phone" class="input" placeholder="10-digit primary contact" pattern="[0-9]{10}" minlength="10" maxlength="10" required title="Please enter a valid 10-digit phone number">
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label class="label">Official Work Email</label>
                <input type="email" name="email" class="input" placeholder="agent@insurix.network" required>
            </div>

            <div class="form-group">
                <label class="label">Terminal Password</label>
                <div style="position: relative;">
                    <input type="password" id="pw-agent-reg" name="password" class="input" placeholder="Secure alphanumeric" maxlength="15" required style="padding-right: 3rem;">
                    <button type="button" class="pw-toggle" onclick="togglePw('pw-agent-reg', this)" tabindex="-1"><i class="ph ph-eye"></i></button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large" style="margin-top: 2rem;">Enroll as an Agent</button>

            {% if error %}
            <p style="color: var(--danger); text-align: center; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500;">
                <i class="ph ph-warning-circle"></i> {{ error }}
            </p>
            {% endif %}
        </form>

        <div style="margin-top: 3rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2rem;">
            <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Already an Insurix Agent?</p>
            <a href="{{ url_for('agent_login') }}" class="btn btn-secondary btn-full">Agent Access</a>
        </div>
    </div>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    btn.querySelector('i').className = isHidden ? 'ph ph-eye-slash' : 'ph ph-eye';
}
</script>
</body>
</html>
