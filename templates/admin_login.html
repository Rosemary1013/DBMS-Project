<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal Access | Insurix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='master.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="centered-page">
    <div class="auth-card animate">
        <a href="{{ url_for('index') }}" style="display: flex; align-items: center; gap: 0.5rem; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;">
            <i class="ph ph-arrow-left"></i> Systems Overview
        </a>

        <div style="text-align: center; margin-bottom: 3rem;">
            <div style="width: 4rem; height: 4rem; background: rgba(59, 130, 246, 0.1); color: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem;">
                <i class="ph-bold ph-key"></i>
            </div>
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Admin Command</h1>
            <p style="color: var(--muted); font-size: 0.95rem;">System-wide authorization required</p>
        </div>

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label class="label">Primary Administrator Email</label>
                <div style="position: relative;">
                    <i class="ph ph-user-gear" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted);"></i>
                    <input type="email" name="email" class="input" placeholder="admin@insurix.command" required style="padding-left: 3rem;">
                </div>
            </div>

            <div class="form-group">
                <label class="label">Secure Auth Password</label>
                <div style="position: relative;">
                    <i class="ph ph-lock-key" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted);"></i>
                    <input type="password" name="password" class="input" placeholder="••••••••" required style="padding-left: 3rem;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large">Authorize Session</button>

            {% if error %}
            <p style="color: var(--danger); text-align: center; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500;">
                <i class="ph ph-warning-circle"></i> {{ error }}
            </p>
            {% endif %}
        </form>

        <div style="margin-top: 3rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2rem;">
            <div style="display: flex; justify-content: center; gap: 1rem; font-size: 0.85rem; color: var(--muted);">
                <a href="{{ url_for('customer_login') }}" style="color: var(--primary);">Customer Access</a>
                <span>•</span>
                <a href="{{ url_for('agent_login') }}" style="color: var(--primary);">Agent Entry</a>
            </div>
        </div>
    </div>
</body>
</html>
