<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Verified | Insurix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='master.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="centered-page">
    <div class="auth-card animate" style="max-width: 500px; text-align: center;">
        <div style="width: 4.5rem; height: 4.5rem; background: rgba(16, 185, 129, 0.1); color: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 2.5rem;">
            <i class="ph-bold ph-check-circle"></i>
        </div>
        
        <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 0.75rem;">Registration Verified</h1>
        <p style="color: var(--muted); margin-bottom: 2.5rem;">The client node has been successfully integrated into the Insurix network.</p>
        
        <div class="card" style="background: rgba(30, 41, 59, 0.4); margin-bottom: 2.5rem; text-align: left;">
            <div style="margin-bottom: 1.5rem;">
                <span style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600;">Client Name</span>
                <span style="font-size: 1.25rem; font-weight: 700; color: var(--text);">{{ customer.FNAME }} {{ customer.LNAME }}</span>
            </div>
            <div>
                <span style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600;">System Access ID</span>
                <span style="font-size: 1.5rem; font-weight: 800; color: var(--primary-light); font-family: monospace;">{{ customer.CUST_ID }}</span>
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-large btn-full"><i class="ph ph-shield-check"></i> Assign Protection Plan</a>
            <a href="{{ url_for('agent_dashboard') }}" class="btn btn-secondary btn-full">Return to Agent Dashboard</a>
        </div>
        
        <div style="margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--muted); font-size: 0.85rem;">
            <i class="ph ph-info" style="font-size: 1.25rem;"></i>
            <span>Securely transmit the Access ID to the client.</span>
        </div>
    </div>
</body>
</html>
