<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Enrollment | Insurix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='master.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="centered-page">
    <div class="auth-card animate" style="max-width: 650px;">
        <a href="{{ url_for('index') }}" style="display: flex; align-items: center; gap: 0.5rem; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;">
            <i class="ph ph-arrow-left"></i> Systems Overview
        </a>

        <div style="text-align: center; margin-bottom: 3rem;">
            <div style="width: 4rem; height: 4rem; background: rgba(59, 130, 246, 0.1); color: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem;">
                <i class="ph-bold ph-user-circle-plus"></i>
            </div>
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Begin Your Legacy</h1>
            <p style="color: var(--muted); font-size: 0.95rem;">Join the elite protection infrastructure of Insurix</p>
        </div>

        <form action="{{ url_for('customer_register') }}" method="POST">
            <div class="grid-3" style="grid-template-columns: 1fr 0.4fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label class="label">First Name</label>
                    <input type="text" name="fname" class="input" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label class="label">M.I.</label>
                    <input type="text" name="mname" class="input" placeholder="D">
                </div>
                <div class="form-group">
                    <label class="label">Last Name</label>
                    <input type="text" name="lname" class="input" placeholder="Doe" required>
                </div>
            </div>

            <div class="grid-2" style="gap: 1.5rem;">
                <div class="form-group">
                    <label class="label">Date of Birth</label>
                    <input type="date" name="dob" class="input" required>
                </div>
                <div class="form-group">
                    <label class="label">Phone Number</label>
                    <input type="text" name="phone" class="input" placeholder="10-digit number" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Primary Email Address</label>
                <input type="email" name="email" class="input" placeholder="name@domain.com" required>
            </div>

            <div class="grid-2" style="gap: 1.5rem;">
                <div class="form-group">
                    <label class="label">Permanent Residence</label>
                    <input type="text" name="per_addr" class="input" placeholder="123 Elite St." required>
                </div>
                <div class="form-group">
                    <label class="label">Reporting Address</label>
                    <input type="text" name="comm_addr" class="input" placeholder="Same as permanent?" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Secure Auth Password</label>
                <div style="position: relative;">
                    <input type="password" id="reg_password" name="password" class="input" placeholder="Max 15 characters" maxlength="15" required style="padding-right: 3rem;">
                    <i class="ph-bold ph-eye" onclick="const p=document.getElementById('reg_password');if(p.type==='password'){p.type='text';this.classList.replace('ph-eye','ph-eye-slash');this.style.color='var(--accent)';}else{p.type='password';this.classList.replace('ph-eye-slash','ph-eye');this.style.color='var(--primary-light)';}" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--primary-light); font-size: 1.25rem; cursor: pointer; transition: all 0.3s;" title="Toggle Password Visibility"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large" style="margin-top: 2rem;">Authorize Enrollment</button>

            {% if error %}
            <p style="color: var(--danger); text-align: center; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500;">
                <i class="ph ph-warning-circle"></i> {{ error }}
            </p>
            {% endif %}
        </form>

        <div style="margin-top: 3rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2rem;">
            <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Already part of the infrastructure?</p>
            <a href="{{ url_for('customer_login') }}" class="btn btn-secondary btn-full">Access Personal Terminal</a>
        </div>
    </div>
</body>
</html>
