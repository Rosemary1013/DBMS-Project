<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login - Insurix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">
            <a href="{{ url_for('index') }}" class="back-button">
                <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
                Back to Home
            </a>

            <div class="login-card">
                <div class="login-header">
                    <div class="icon-circle">
                        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <h1 class="login-title">Agent Login</h1>
                    <p class="login-subtitle">Manage client policies, process claims, and track commissions</p>
                </div>

                <form class="login-form" method="POST" action="{{ url_for('agent_login') }}">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input 
                                type="email" 
                                name="email"
                                id="email" 
                                class="form-input" 
                                placeholder="Enter your email"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input 
                                type="password" 
                                name="password"
                                id="password" 
                                class="form-input" 
                                placeholder="Enter your password"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox">
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-large">Sign In</button>
                    
                    {% if error %}
                        <p style="color:red; text-align:center; margin-top: 10px;">{{ error }}</p>
                    {% endif %}
                </form>

                <div class="switch-links" style="margin-top: 20px;">
                    <p class="switch-text">New Agent?</p>
                    <a href="{{ url_for('agent_register') }}" class="btn btn-outline btn-full">Register Here</a>
                </div>

                <div class="switch-links">
                    <p class="switch-text">Login as different user type:</p>
                    <div class="switch-buttons">
                        <a href="{{ url_for('customer_login') }}" class="switch-link">Customer</a>
                        <a href="{{ url_for('admin_login') }}" class="switch-link">Admin</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
