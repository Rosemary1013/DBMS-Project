<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Access | Insurix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='master.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="centered-page">
    <div class="auth-card animate">
        <a href="{{ url_for('index') }}" style="display: flex; align-items: center; gap: 0.5rem; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;">
            <i class="ph ph-arrow-left"></i> Systems Overview
        </a>

        <div style="text-align: center; margin-bottom: 3rem;">
            <div style="width: 4rem; height: 4rem; background: rgba(59, 130, 246, 0.1); color: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem;">
                <i class="ph-bold ph-briefcase"></i>
            </div>
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Agent Access</h1>
            <p style="color: var(--muted); font-size: 0.95rem;">Authorized field representatives only</p>
        </div>

        <form action="{{ url_for('agent_login') }}" method="POST">
            <div class="form-group">
                <label class="label">Agent Email Address</label>
                <div style="position: relative;">
                    <i class="ph ph-identification-card" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted);"></i>
                    <input type="email" name="email" class="input" placeholder="agent@insurix.network" required style="padding-left: 3rem;">
                </div>
            </div>

            <div class="form-group">
                <label class="label">Secure Terminal Password</label>
                <div style="position: relative;">
                    <i class="ph ph-lock-key" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted);"></i>
                    <input type="password" id="agent_password" name="password" class="input" placeholder="••••••••" required style="padding-left: 3rem; padding-right: 3rem;">
                    <i class="ph-bold ph-eye" onclick="const p=document.getElementById('agent_password');if(p.type==='password'){p.type='text';this.classList.replace('ph-eye','ph-eye-slash');this.style.color='var(--accent)';}else{p.type='password';this.classList.replace('ph-eye-slash','ph-eye');this.style.color='var(--primary-light)';}" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--primary-light); font-size: 1.25rem; cursor: pointer; transition: all 0.3s;" title="Toggle Password Visibility"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large">Access Agent Dashboard</button>

            {% if error %}
            <p style="color: var(--danger); text-align: center; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500;">
                <i class="ph ph-warning-circle"></i> {{ error }}
            </p>
            {% endif %}
        </form>

        <div style="margin-top: 3rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2rem;">
            <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Need to register a new agent node?</p>
            <a href="{{ url_for('agent_register') }}" class="btn btn-secondary btn-full">Enroll as Agent</a>
        </div>

        <div style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 1rem; font-size: 0.85rem; color: var(--muted);">
            <a href="{{ url_for('customer_login') }}" style="color: var(--primary);">Customer Portal</a>
            <span>•</span>
            <a href="{{ url_for('admin_login') }}" style="color: var(--primary);">Admin command Center</a>
        </div>
    </div>
</body>
</html>
